<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" sizes="32x32" href="/images/logoo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/css/normalize.css">
    <link rel="stylesheet" href="/css/login.css" />
    <link rel="stylesheet" href="/css/loader.css" />
    <title>Log in to your account</title>
    <style>
      @keyframes slideFromLeft {
        from {
          opacity: 0;
          transform: translateX(-48px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }
      @keyframes slideFromRight {
        from {
          opacity: 0;
          transform: translateX(48px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }

      /* Page fades in */
      .page {
        animation: fadeIn 0.4s ease both;
      }

      /* Image slides in from the left */
      .image-wrapper {
        animation: slideFromLeft 0.7s cubic-bezier(0.16, 1, 0.3, 1) 0.5s both;
      }

      /* Form wrapper slides in from the right with delay */
      .login-wrapper {
        animation: slideFromRight 0.7s cubic-bezier(0.16, 1, 0.3, 1) 0.5s both;
      }
    </style>
  </head>

  <body>
    <!-- Redirect Spinner -->
    <div id="redirectSpinner" class="spinner-overlay" style="display: none">
      <div class="spinner-bg"></div>
      <div class="banter-loader">
        <div class="banter-loader__box"></div>
        <div class="banter-loader__box"></div>
        <div class="banter-loader__box"></div>
        <div class="banter-loader__box"></div>
        <div class="banter-loader__box"></div>
        <div class="banter-loader__box"></div>
        <div class="banter-loader__box"></div>
        <div class="banter-loader__box"></div>
        <div class="banter-loader__box"></div>
      </div>
    </div>

    <div class="page">
      <div class="card">
        <div class="image-wrapper">
          <img src="/images/login-img.png" alt="Login illustration" />
        </div>

        <div class="login-wrapper">
          <h2 class="title-header">Welcome Back!</h2>
          <p class="subtitle">Sign in and start building.</p>

          <form id="loginForm" novalidate>
            <label for="email">Email Address</label>
            <div class="input-container">
              <i data-lucide="at-sign"></i>
              <input
                type="email"
                id="email"
                name="email"
                placeholder="Enter your email"
                required
              />
            </div>
            <div
              id="emailMessage"
              style="margin-bottom: 10px; font-size: 12px"
            ></div>

            <label for="password" class="password-label">Password</label>
            <div class="input-container">
              <i data-lucide="lock-keyhole"></i>
              <input
                type="password"
                id="password"
                name="password"
                placeholder="Enter your password"
                required
              />
              <button
                id="toggle-password"
                style="
                  cursor: pointer;
                  display: flex;
                  background: transparent;
                  border: none;
                "
              >
                <i data-lucide="eye"></i>
              </button>
            </div>
            <div
              id="passwordMessage"
              style="margin-bottom: 10px; font-size: 12px"
            ></div>

            <button type="submit" class="login-btn">Login</button>

            <p class="paragraph">
              Don't have an account?
              <a href="/register" class="secondary-link">Create account</a>
            </p>
            <p class="paragraph">
              <a
                href="/pages/compiler"
                class="secondary-link"
                style="color: #d1d1d1"
              >
                Continue as Guest 
              </a>
            </p>
          </form>
        </div>
      </div>
    </div>

    <script src="/libs/lucide.js"></script>
    <script src="/js/login.js" defer></script>
  </body>
</html>
