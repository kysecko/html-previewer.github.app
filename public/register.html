<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" sizes="32x32" href="/images/logoo.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Styles -->
  <link rel="stylesheet" href="/css/login.css" />

  <!-- Icons -->
  <script src="/libs/lucide.js"></script>

  <!-- JS -->
  <script src="/js/config.js"></script>
  <script src="/js/register.js" defer></script>

  <title>Create an account</title>
</head>

<body>
  <div class="page">

    <!-- Success Modal nakahide by default -->
    <div id="successModal" class="modal">
      <div class="modal-content">
        <div class="success-icon">
          <i data-lucide="check-check"></i>
        </div>

        <h2>Registration Successful!</h2>
        <p>You will be redirected to the login page.</p>
      </div>
    </div>


    <div class="card">
      <div class="image-wrapper">
        <img src="/images/register-img.png" alt="Registration illustration" />
      </div>

      <div class="login-wrapper">

        <h2 class="title-header">Let's start coding!</h2>
        <p class="subtitle">Join us and start building something amazing.</p>

        <form id="registerForm" method="post" novalidate>

          <label>Username</label>
          <div class="input-container">
            <i data-lucide="user-round"></i>
            <input id="username" type="text" placeholder="Choose a username" />
          </div>

          <label>Email Address</label>
          <div class="input-container">
            <i data-lucide="at-sign"></i>
            <input id="email" type="email" placeholder="Enter valid email" />
          </div>
          <div id="emailMessage" style="margin-bottom: 10px; font-size: 12px;"></div>

          <label>Password</label>
          <div class="input-container">
            <i data-lucide="lock-keyhole"></i>
            <input id="password" type="password" placeholder="Create a password" />
          </div>
          <div id="passwordMessage" style="margin-bottom: 10px; font-size: 12px;"></div>

          <label>Confirm Password</label>
          <div class="input-container">
            <i data-lucide="lock-keyhole"></i>
            <input id="confirm-password" type="password" placeholder="Confirm password" />
          </div>
          <div id="confirmPasswordMessage" style="margin-bottom: 10px; font-size: 12px;"></div>

          <div id="message" style="margin-bottom: 10px;"></div>

          <div class="input-links-container">
            <input type="checkbox" id="terms" name="terms" />
            <p>
              By continuing, you agree to our
              <a href="terms.html">Terms & Conditions</a>
              and
              <a href="privacy.html">Privacy Policy</a>.
            </p>
          </div>

          <button type="submit" class="login-btn">Create Account</button>

          <p class="paragraph">
            Already have an account?
            <a href="/login.html" class="secondary-link">Sign in</a>
          </p>
          <p class="paragraph">
            <a href="/pages/compiler.html" class="secondary-link" style="color: #d1d1d1;">Continue as Guest</a>
          </p>
        </form>
      </div>
    </div>
  </div>

</body>

</html>
